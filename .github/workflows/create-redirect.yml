name: Create Redirect

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write

jobs:

  create-redirect:

    if: >
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'create-redirect')

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Redirect Creator
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/createRedirect.js

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add redirects.json

          git diff --cached --quiet || git commit -m "Create redirect from #${{ github.event.issue.number }}"

          git push

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Redirect successfully created and deployed."
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
